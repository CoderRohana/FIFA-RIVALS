<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA RIVALS | Pro Collector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --fifa-black: #0b0e13;
            --fifa-gold: #e2b35a;
            --card-gradient: linear-gradient(145deg, #2c2c2c, #000000);
            --sidebar-width: 200px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--fifa-black);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-wrapper { 
            display: flex; 
            flex: 1; 
            width: 100%;
        }

        #sidebar {
            width: var(--sidebar-width);
            background: #050505;
            border-right: 1px solid var(--fifa-gold);
            padding: 10px;
            height: calc(100vh - 70px);
            position: sticky;
            top: 70px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .player-list-item {
            display: flex; align-items: center; gap: 8px; padding: 6px;
            margin: 4px 0; background: #111; border-radius: 4px; border: 1px solid #333;
        }
        
        .sidebar-thumb { 
            width: 25px; height: 35px; background: #222; 
            object-fit: contain; filter: grayscale(1); opacity: 0.3; 
        }

        .collected { border: 1px solid var(--fifa-gold); background: #1a1710; }
        .collected .sidebar-thumb { filter: grayscale(0); opacity: 1; }

        .content { 
            flex: 1; 
            padding: 20px; 
            text-align: center;
            min-width: 0;
        }

        .card-container {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            max-width: 1200px; 
            margin: 20px auto;
        }

        .player-card {
            background: var(--card-gradient); 
            border: 2px solid var(--fifa-gold);
            border-radius: 10px 10px 10px 40px; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            min-height: 350px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .rating { font-size: 2.5rem; color: var(--fifa-gold); font-weight: 900; text-align: left; }
        
        .player-img { 
            width: 100%; 
            height: 180px; 
            object-fit: contain; 
            margin: 5px 0;
        }

        .player-name { 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            border-top: 1px solid var(--fifa-gold); 
            padding-top: 8px; 
            font-weight: 800;
            margin-top: auto;
        }

        .card-stats {
            display: flex; justify-content: space-around;
            background: rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 8px; margin-top: 8px;
        }

        .stat-value { color: var(--fifa-gold); font-weight: bold; font-size: 1.1rem; }
        .stat-label { font-size: 0.65rem; color: #aaa; display: block; }

        button {
            padding: 12px 20px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; border-radius: 5px; border: none; margin: 5px;
        }

        #packBtn { background: var(--fifa-gold); color: black; }
        #ssBtn { background: white; color: black; display: none; }

        /* Footer Styling */
        footer {
            background: #050505;
            color: var(--fifa-gold);
            text-align: center;
            padding: 15px;
            border-top: 1px solid var(--fifa-gold);
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            #sidebar { 
                width: 100%; 
                height: auto; 
                max-height: 150px; 
                position: relative; 
                top: 0;
                border-right: none;
                border-bottom: 1px solid var(--fifa-gold);
            }
            #playerTrackerList {
                display: flex;
                flex-wrap: nowrap;
                overflow-x: auto;
                gap: 10px;
            }
            .player-list-item { flex: 0 0 120px; }
        }
    </style>
</head>
<body>

<header style="height: 70px; padding: 0 20px; border-bottom: 2px solid var(--fifa-gold); display: flex; align-items: center; justify-content: center;">
    <h1 style="margin:0; font-size: 1.5rem;">FIFA RIVALS</h1>
</header>

<div class="main-wrapper">
    <div id="sidebar">
        <h4 id="sideTitle" style="color:var(--fifa-gold); margin-top: 0;">COLLECTION (0/23)</h4>
        <div id="playerTrackerList"></div>
    </div>

    <div class="content">
        <div id="paymentArea" style="display: none; background: rgba(37, 211, 102, 0.1); border: 2px solid #25D366; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
            <h4 style="color:#25D366;">Premium Access Required</h4>
            <button onclick="sendToWhatsApp()" style="background:#25D366; color:white;">Verify via WhatsApp</button>
        </div>

        <div class="btn-group">
            <button id="packBtn" onclick="handlePackOpening()">Open 5-Player Pack</button>
            <button id="ssBtn" onclick="takeScreenshot()">Download Squad</button>
        </div>

        <div id="captureArea" style="background: #0b0e13; padding: 10px; width: 100%;">
            <div class="card-container" id="packResults"></div>
        </div>
    </div>
</div>

<footer>
    MADE BY ROHAN DUTTA
</footer>

<script>
    const playerData = {
        "Buffon": { ovr: 93, att: 10, def: 94 },
        "Casillas": { ovr: 92, att: 12, def: 93 },
        "CR7": { ovr: 91, att: 94, def: 35 },
        "Cruyff": { ovr: 95, att: 96, def: 60 },
        "Haaland": { ovr: 94, att: 98, def: 40 },
        "Hakimi": { ovr: 88, att: 85, def: 84 },
        "Joao Cancelo": { ovr: 87, att: 84, def: 82 },
        "Kaka": { ovr: 91, att: 90, def: 55 },
        "Kounde": { ovr: 88, att: 70, def: 89 },
        "Maldini": { ovr: 96, att: 65, def: 98 },
        "Maradona": { ovr: 97, att: 98, def: 50 },
        "Mbappe": { ovr: 95, att: 97, def: 42 },
        "Messi": { ovr: 92, att: 93, def: 38 },
        "Modric": { ovr: 89, att: 86, def: 78 },
        "Nesta": { ovr: 92, att: 45, def: 94 },
        "Pele": { ovr: 98, att: 99, def: 55 },
        "R9": { ovr: 97, att: 99, def: 40 },
        "Roberto Carlos": { ovr: 91, att: 88, def: 89 },
        "Ronaldinho": { ovr: 94, att: 95, def: 45 },
        "Xavi": { ovr: 90, att: 85, def: 75 },
        "Yamal": { ovr: 89, att: 91, def: 48 },
        "Yashin": { ovr: 94, att: 10, def: 96 }
    };

    const allPlayers = Object.keys(playerData).sort();
    let myCollection = new Set();
    let packsOpened = 0;
    let verified = false;

    function updateSidebar() {
        const list = document.getElementById('playerTrackerList');
        list.innerHTML = allPlayers.map(p => {
            const isColl = myCollection.has(p);
            const imgPath = `images/${p.toLowerCase().replace(/\s+/g, '_')}.png`;
            return `
                <div class="player-list-item ${isColl ? 'collected' : ''}">
                    <img class="sidebar-thumb" src="${imgPath}" onerror="this.style.display='none'">
                    <span style="font-size:0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${p}</span>
                </div>`;
        }).join('');
        document.getElementById('sideTitle').innerText = `(${myCollection.size}/${allPlayers.length})`;
    }
    updateSidebar();

    function handlePackOpening() {
        if (packsOpened >= 1 && !verified) {
            document.getElementById('paymentArea').style.display = 'block';
            alert("Limit reached! Payment required to open more packs. Please verify via WhatsApp.");
            return;
        }
        openPack();
    }

    function openPack() {
        const display = document.getElementById('packResults');
        display.innerHTML = ''; 
        const selected = [...allPlayers].sort(() => 0.5 - Math.random()).slice(0, 5);
        
        selected.forEach(playerName => {
            const stats = playerData[playerName];
            const imgPath = `images/${playerName.toLowerCase().replace(/\s+/g, '_')}.png`;
            myCollection.add(playerName);
            
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `
                <div class="rating">${stats.ovr}</div>
                <img class="player-img" src="${imgPath}" onerror="this.style.visibility='hidden'">
                <div class="player-name">${playerName}</div>
                <div class="card-stats">
                    <div><span class="stat-label">ATT</span><span class="stat-value">${stats.att}</span></div>
                    <div><span class="stat-label">DEF</span><span class="stat-value">${stats.def}</span></div>
                </div>`;
            display.appendChild(card);
        });

        document.getElementById('ssBtn').style.display = 'inline-block';
        packsOpened++;
        updateSidebar();
    }

    async function takeScreenshot() {
        const btn = document.getElementById('ssBtn');
        btn.innerText = "Saving...";
        await new Promise(r => setTimeout(r, 500));
        try {
            const canvas = await html2canvas(document.getElementById('captureArea'), {
                backgroundColor: "#0b0e13",
                scale: 2,
                useCORS: true,
                allowTaint: true
            });
            const link = document.createElement('a');
            link.download = `squad-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        } catch (e) { alert("Download failed. Try hosting your site or using Live Server."); }
        btn.innerText = "Download Squad";
    }

    function sendToWhatsApp() {
        window.open(`https://wa.me/9123725812?text=Paid%20Rs100%20please%20confirm.`, '_blank');
        verified = true;
        document.getElementById('paymentArea').style.display = 'none';
    }
</script>
</body>
</html>
