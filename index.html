<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA RIVALS | Pro Collector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --fifa-black: #0b0e13;
            --fifa-gold: #e2b35a;
            --card-gradient: linear-gradient(145deg, #2c2c2c, #000000);
            --sidebar-width: 200px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--fifa-black);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            width: 100%;
        }

        #sidebar {
            width: var(--sidebar-width);
            background: #050505;
            border-right: 1px solid var(--fifa-gold);
            padding: 10px;
            height: calc(100vh - 70px);
            position: sticky;
            top: 70px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .player-list-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            margin: 4px 0;
            background: #111;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .sidebar-thumb {
            width: 25px;
            height: 35px;
            background: #222;
            object-fit: contain;
            filter: grayscale(1);
            opacity: 0.3;
        }

        .collected {
            border: 1px solid var(--fifa-gold);
            background: #1a1710;
        }

        .collected .sidebar-thumb {
            filter: grayscale(0);
            opacity: 1;
        }

        .content {
            flex: 1;
            padding: 20px;
            text-align: center;
            min-width: 0;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 20px auto;
        }

        .player-card {
            background: var(--card-gradient);
            border: 2px solid var(--fifa-gold);
            border-radius: 10px 10px 10px 40px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 350px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .rating {
            font-size: 2.5rem;
            color: var(--fifa-gold);
            font-weight: 900;
            text-align: left;
        }

        .player-img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            margin: 5px 0;
        }

        .player-name {
            font-size: 1.1rem;
            text-transform: uppercase;
            border-top: 1px solid var(--fifa-gold);
            padding-top: 8px;
            font-weight: 800;
            margin-top: auto;
        }

        .card-stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .stat-value {
            color: var(--fifa-gold);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #aaa;
            display: block;
        }

        button {
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 5px;
            border: none;
            margin: 5px;
        }

        #packBtn {
            background: var(--fifa-gold);
            color: black;
        }

        #packBtn:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        #ssBtn {
            background: white;
            color: black;
            display: none;
        }

        #timerDisplay {
            margin-top: 10px;
            color: var(--fifa-gold);
            font-weight: bold;
            font-size: 0.9rem;
        }

        footer {
            background: #050505;
            color: var(--fifa-gold);
            text-align: center;
            padding: 15px;
            border-top: 1px solid var(--fifa-gold);
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

        style="height: 70px; padding: 0 20px; border-bottom: 2px solid var(--fifa-gold); display: flex; align-items: center; justify-content: center;">

    </header>

    <div class="main-wrapper">
        <div id="sidebar">
            <h4 id="sideTitle" style="color:var(--fifa-gold); margin-top: 0;">COLLECTION (0/0)</h4>
            <div id="playerTrackerList"></div>
        </div>

        <div class="content">
            <div class="btn-group">
                <button id="packBtn" onclick="handlePackOpening()">Open 5-Player Pack</button>

            <div id="captureArea" style="background: #0b0e13; padding: 10px; width: 100%;">

    </div>

        };

        const allPlayers = Object.keys(playerData).sort();
        let myCollection = new Set();
        const COOLDOWN_TIME = 12 * 60 * 60 * 1000; // 12 Hours

        function updateSidebar() {
            const list = document.getElementById('playerTrackerList');
            list.innerHTML = allPlayers.map(p => {
                const isColl = myCollection.has(p);
                const imgPath = `images/${p.toLowerCase().replace(/\s+/g, '_')}.png`;
                return `
                <div class="player-list-item ${isColl ? 'collected' : ''}">
                    <img class="sidebar-thumb" src="${imgPath}" onerror="this.style.display='none'">
                    <span style="font-size:0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${p}</span>
                </div>`;
            }).join('');
            document.getElementById('sideTitle').innerText = `COLLECTION (${myCollection.size}/${allPlayers.length})`;
        }

        function checkCooldown() {
            const lastOpened = localStorage.getItem('lastPackTime');
            const packBtn = document.getElementById('packBtn');
            const timerDisplay = document.getElementById('timerDisplay');

            if (lastOpened) {
                const elapsed = Date.now() - parseInt(lastOpened);
                if (elapsed < COOLDOWN_TIME) {
                    packBtn.disabled = true;
                    const remaining = COOLDOWN_TIME - elapsed;
                    startTimer(remaining);
                    return false;
                }
            }
            packBtn.disabled = false;
            timerDisplay.innerText = "";
            return true;
        }

        function startTimer(duration) {
            const timerDisplay = document.getElementById('timerDisplay');
            const interval = setInterval(() => {
                const hours = Math.floor(duration / (1000 * 60 * 60));
                const minutes = Math.floor((duration % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((duration % (1000 * 60)) / 1000);

                timerDisplay.innerText = `Next pack in: ${hours}h ${minutes}m ${seconds}s`;
                duration -= 1000;

                if (duration < 0) {
                    clearInterval(interval);
                    checkCooldown();
                }
            }, 1000);
        }

        function handlePackOpening() {
            if (checkCooldown()) {
                openPack();
                localStorage.setItem('lastPackTime', Date.now().toString());
                checkCooldown();
            }
        }

        function openPack() {
            const display = document.getElementById('packResults');
            display.innerHTML = '';
            const selected = [...allPlayers].sort(() => 0.5 - Math.random()).slice(0, 5);

            selected.forEach(playerName => {
                const stats = playerData[playerName];
                const imgPath = `images/${playerName.toLowerCase().replace(/\s+/g, '_')}.png`;
                myCollection.add(playerName);

                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                <div class="rating">${stats.ovr}</div>
                <img class="player-img" src="${imgPath}" onerror="this.style.visibility='hidden'">
                <div class="player-name">${playerName}</div>
                <div class="card-stats">
                    <div><span class="stat-label">ATT</span><span class="stat-value">${stats.att}</span></div>
                    <div><span class="stat-label">DEF</span><span class="stat-value">${stats.def}</span></div>
                </div>`;
                display.appendChild(card);
            });

            document.getElementById('ssBtn').style.display = 'inline-block';
            updateSidebar();
        }

        async function takeScreenshot() {
            const btn = document.getElementById('ssBtn');
            btn.innerText = "Saving...";
            await new Promise(r => setTimeout(r, 500));
            try {
                const canvas = await html2canvas(document.getElementById('captureArea'), {
                    backgroundColor: "#0b0e13",
                    scale: 2,
                    useCORS: true,
                    allowTaint: true
                });
                const link = document.createElement('a');
                link.download = `squad-${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            } catch (e) { alert("Download failed. Try hosting your site or using Live Server."); }
            btn.innerText = "Download Squad";
        }

        // Initialize
        updateSidebar();
        checkCooldown();
    </script>

</html>
